<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastro do usuário">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <div class="container">
        <h2>Cadastro</h2>

        <form>

            <label>Nome completo:</label>
            <input type="text" id="nome" name="nome" >
            <div id="nomemsg"></div>

            <label>Nome materno:</label>
            <input type="text" id="mothername" name="mothername">
            <div id="mothernamemsg"></div>

            <label>Celular:</label>
            <input type="tel" id="celular" name="celular">
            <div id="cellmsg"></div>

            <label>E-mail:</label>
            <input type="email" id="email" name="email">
            <div id="emailmsg"></div>

            <label>Senha:</label>
            <input type="password" id="password" name="password">
            <div id="passwordmsg"></div>

            <label>Confirmar senha:</label>
            <input type="password" id="confirmpassword" name="confirmpassword">
            <div id="confirmpasswordmsg"></div>

            <label>CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX">
            <div id = "cpfmsg"></div>

            <label>CEP:</label>
            <input type="text" id="cep" name="cep" placeholder="XXXXX-XXX">
            <div id="cepmsg"></div>

            <label>Bairro:</label>
            <input type="text" id="bairro" name="bairro">

            <label>Rua:</label>
            <input type="text" id="rua" name="rua">

            <label>Cidade:</label>
            <input type="text" id="cidade" name="cidade">

            <button type="submit" onclick="validar()">Cadastrar</button>
            <div id="buttonmsg"></div>

        </form>
    </div>

    <script src="../js/validaCadastro.js"></script>

</body>
</html>
