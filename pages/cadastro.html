<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastro do usuário">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/validaCadastro.js" defer></script>
</head>
<body>
    
    <div class="container">
        <h2>Cadastro</h2>

        <form>

            <label>Nome completo:</label>
            <input type="text" id="nome" placeholder="Ex.: João Silva" >
            <div id="nomemsg"></div>

            <label>E-mail:</label>
            <input type="email" id="email" name="email" placeholder="joao.silva@gmail.com">
            <div id="emailmsg"></div>

            <label>Senha:</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha.">
            <div id="passwordmsg"></div>

            <label>Confirmar senha:</label>
            <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Digite sua senha novamente.">
            <div id="confirmpasswordmsg"></div>

            <label>CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX">
            <div id = "cpfmsg"></div>

            <label>CEP:</label>
            <input type="text" id="cep" name="cep" placeholder="XXXXX-XXX">
            <div id="cepmsg"></div>

            <label>Bairro:</label>
            <input type="text" id="bairro" name="bairro" readonly>

            <label>Rua:</label>
            <input type="text" id="rua" name="rua" readonly>

            <label>Cidade:</label>
            <input type="text" id="cidade" name="cidade" readonly>

            <label>Estado:</label>
            <input type="text" id="uf" name="estado" readonly>

            <button type="submit" onclick="validar()">Cadastrar</button>
            <div id="buttonmsg"></div>

        </form>
    </div>

    

</body>
</html>
